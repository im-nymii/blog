# Site settings
title: Nymii's Lab
description: Cybersecurity articles, writeups & technical blog
author: Nymii
baseurl: "/blog"
url: "https://nymii.dev"

# GitHub info
github_username: im-nymii

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /posts/:title/

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Default front matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Nymii"
